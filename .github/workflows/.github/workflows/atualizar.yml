name: Atualizar dados do Tesouro

on:
  schedule:
    - cron: '0 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependências
        run: pip install requests pandas xlrd

      - name: Gerar dados.json
        run: |
          cd scripts
          python gerar_dados_json.py
          mv dados.json ../dados.json

      - name: Publicar alteração
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Atualiza dados do Tesouro Direto"
          git push
